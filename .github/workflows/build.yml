name: Build Binary Sing-box

on:
  push:
    paths-ignore:
      - "**.md"

jobs:
  sing-box:
    runs-on: ubuntu-latest
    outputs:
      version: ${{steps.sing-box.outputs.version}}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          check-latest: true

      - name: get sing-box version
        id: sing-box
        run: |
          git remote add sekai https://github.com/SagerNet/sing-box.git
          git fetch --tags sekai
          version=$(CGO_ENABLED=0 go run ./cmd/internal/read_tag)
          echo version=$version >> $GITHUB_OUTPUT

  android-build:
    runs-on: ubuntu-latest
    needs:
      - sing-box
    strategy:
      matrix:
        jobs:
          - {
              goarch: arm,
              ndk: armv7a-linux-androideabi30,
              output: armeabi-v7a,
            }
          - { goarch: arm64, ndk: aarch64-linux-android30, output: arm64-v8a }
      fail-fast: false
    env:
      VERSION: ${{needs.sing-box.outputs.version}}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          check-latest: true

      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27

      - name: Build binary
        env:
          CC: ${{steps.setup-ndk.outputs.ndk-path}}/toolchains/llvm/prebuilt/linux-x86_64/bin/${{matrix.jobs.ndk}}-clang
          CX: ${{steps.setup-ndk.outputs.ndk-path}}/toolchains/llvm/prebuilt/linux-x86_64/bin/${{matrix.jobs.ndk}}-clang++
          TAGS: with_gvisor,with_dhcp,with_wireguard,with_reality_server,with_clash_api,with_quic,with_utls,with_ech
          GOOS: android
          GOARM: 7
          GOARCH: ${{matrix.jobs.goarch}}
          CGO_ENABLED: 1
        run: go build -v -trimpath -ldflags "-X 'github.com/sagernet/sing-box/constant.Version=${VERSION}' -s -w -buildid=" -tags "${TAGS}" ./cmd/sing-box

      - name: Compress File
        run: |
          mkdir bin
          zip -9 -m ./bin/sing-box-${{env.VERSION}}-android-${{matrix.jobs.output}}.zip ./sing-box
          ls -l bin
        shell: bash

      - uses: actions/upload-artifact@v4
        with:
          name: sing-box-${{env.VERSION}}-android-${{matrix.jobs.output}}
          path: bin/

      # - name: Tar files
      #   run: tar -czvf "sing-box-${{env.VERSION}}-android-${{matrix.jobs.output}}.tar.gz" sing-box

