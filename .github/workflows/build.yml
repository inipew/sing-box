name: Build Binary Sing-box

on:
  push:
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".gitignore"
      - "LICENSE"
  workflow_dispatch:
    inputs:
      version:
        description: "Version name"
        required: false
        type: string
      debug:
        description: 'Enable debug mode'
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: '1.23'
  NDK_VERSION: 'r28-beta2'
  BUILD_TAGS: with_gvisor,with_dhcp,with_wireguard,with_reality_server,with_clash_api,with_quic,with_utls,with_ech

jobs:
  sing-box:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.set-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true
          cache: true

      - name: Set version
        id: set-version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}"
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            git remote add sekai https://github.com/SagerNet/sing-box.git || true
            git fetch --tags sekai
            version=$(CGO_ENABLED=0 go run ./cmd/internal/read_tag)
            echo "version=$version" >> "$GITHUB_OUTPUT"
          fi

  android-build:
    runs-on: ubuntu-latest
    needs: sing-box
    strategy:
      matrix:
        arch:
          - goarch: arm
            ndk: armv7a-linux-androideabi30
            output: armeabi-v7a
          - goarch: arm64
            ndk: aarch64-linux-android30
            output: arm64-v8a
      fail-fast: false
    env:
      VERSION: ${{ needs.sing-box.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true
          cache: true

      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: ${{ env.NDK_VERSION }}

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Build binary
        env:
          CC: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/${{ matrix.arch.ndk }}-clang
          CXX: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/${{ matrix.arch.ndk }}-clang++
          TAGS: ${{ env.BUILD_TAGS }}
          GOOS: android
          GOARM: 7
          GOARCH: ${{ matrix.arch.goarch }}
          CGO_ENABLED: 1
        run: |
          LDFLAGS="-X 'github.com/sagernet/sing-box/constant.Version=${VERSION}' -w"
          if [[ "${{ github.event.inputs.debug }}" == "true" ]]; then
            LDFLAGS="${LDFLAGS} -X 'github.com/sagernet/sing-box/constant.Debug=true'"
          else
            LDFLAGS="${LDFLAGS} -s -buildid="
          fi
          
          go build -v -trimpath -ldflags "${LDFLAGS}" -tags "${TAGS}" ./cmd/sing-box

      - name: Compress File
        run: |
          mkdir -p bin
          zip -9 -m ./bin/sing-box-${{ env.VERSION }}-android-${{ matrix.arch.output }}.zip ./sing-box
          sha256sum ./bin/*.zip > ./bin/SHA256SUMS.txt
          ls -l bin

      - uses: actions/upload-artifact@v4
        with:
          name: sing-box-${{ env.VERSION }}-android-${{ matrix.arch.output }}
          path: bin/
          retention-days: 7

  upload:
    name: Telegram Upload Release
    runs-on: ubuntu-latest
    needs: [sing-box, android-build]
    # if: "${{ github.event.inputs }}"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: bin/
          merge-multiple: true

      - name: Display structure of downloaded files
        run: ls -R bin/

      - name: Upload to Telegram
        env:
          CHAT_ID: "-1002143345830"
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          VERSION: ${{ needs.sing-box.outputs.version }}
          TAGS: ${{ env.BUILD_TAGS }}
        run: |
          if [ -n "${{ secrets.BOT_TOKEN }}" ]; then
            set -e
            export COMMIT=$(git log --pretty=format:"%h %an %s" | grep -v "inipew" | sed 's/^\([^ ]*\) [^ ]* /`\1` — /' | head -n 10)
            export CHERRY_PICK_COMMIT=$(git log --pretty=format:"%h %an %s" --author="inipew" | sed 's/^\([^ ]*\) [^ ]* /`\1` — /')
            
            FILES=$(find bin -name "sing-box-*.zip")
            if [ -n "$FILES" ]; then
              pip3 install --user pyrogram tgcrypto rich
              python3 $GITHUB_WORKSPACE/.github/sendtotelegramchannel.py $FILES
            else
              echo "No compressed files found in bin directory."
              exit 1
            fi
          else
            echo "BOT_TOKEN is not available. Skipping upload to Telegram."
          fi