  upload:
    name: telegram upload release
    runs-on: ubuntu-latest
    needs:
      - sing-box
      - android-build
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # - uses: actions/download-artifact@v3
      #   with:
      #     name: sing-box-android

      # - uses: actions/download-artifact@v3
      #   with:
      #     name: sing-box-linux
      - uses: actions/download-artifact@v4
        with:
          path: bin/
          merge-multiple: true

      - name: Display structure of downloaded files
        run: ls -R | grep ".zip"

      - name: upload to telegram
        env:
          CHAT_ID: "-1002143345830"
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          VERSION: ${{needs.sing-box.outputs.version}}
          TAGS: with_gvisor,with_dhcp,with_wireguard,with_reality_server,with_clash_api,with_quic,with_utls,with_ech
        run: |
          if [ -n "${{ secrets.BOT_TOKEN }}" ]; then
            export COMMIT=$(git log --oneline --since="48 hours ago" | sed 's/^[0-9a-f]* //' | sed 's/^/— /' | tail -n +15 | head -n 10)
            export CHERRY_PICK_COMMIT=$(git log --oneline -n 12 --no-decorate | sed 's/^[0-9a-f]* //' | sed 's/^/— /' | tail -n +2)
            FILE=$(find ~ -name "sing-box-*.zip")
            if [ -n "$FILE" ]; then
              pip3 install telethon==1.36.0 && python3 $GITHUB_WORKSPACE/.github/sendtotelegramchannel.py $FILE
            else
              echo "No compressed file found in sing-box directory."
            fi
          else
            echo "BOT_TOKEN is not available. Skipping upload to Telegram."
          fi
